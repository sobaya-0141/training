name: Improvement
description: 既存機能や開発基盤の改善
title: "[Improve]: "
labels: ["improvement", "triage"]
body:
  - type: textarea
    id: current
    attributes:
      label: 現状
      description: 今の状態や困っていることを書いてください。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 改善案
      description: どのように改善したいかを書いてください。
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: 対象範囲
      description: 影響する画面、機能、設定、ドキュメントなどを書いてください。
